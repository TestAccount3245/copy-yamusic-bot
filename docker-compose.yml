services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: yamusic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/storage:/app/storage
    env_file: .env
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  bot:
    build: ./backend
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/storage:/app/storage
    env_file: .env
    command: python -m bot.main

  miniapp:
    build: ./miniapp
    ports:
      - "3000:3000"
    command: npm run dev -- --host 0.0.0.0 --port 3000

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - miniapp

volumes:
  pgdata:
